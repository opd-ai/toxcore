# staticcheck.conf - Configuration for staticcheck linter
# https://staticcheck.io/docs/configuration

# Check categories:
# - SA*: staticcheck analyzers (static analysis)
# - S*: simple code simplifications  
# - ST*: style checks
# - QF*: quick fixes
# - U*: unused code detection

checks = [
    "all",
    "-U1000",  # Disable unused code detection - many intentional stubs for planned features
    "-ST1005", # Disable error string style check - project uses sentence-case errors
    "-ST1003", # Disable underscore naming check - C API intentionally uses underscores for compatibility
    "-ST1021", # Disable doc comment style check - some exported types use different style
    "-ST1023", # Disable type inference suggestion - explicit types improve readability
    "-SA9003", # Disable empty branch check - some empty branches are intentional placeholders
    "-SA4006", # Disable unused value check in tests - some are for future assertions
    "-SA4003", # Disable integer comparison check - tests intentionally check edge cases
    "-SA4017", # Disable Now() side effect check - tests use Now() for timing diagnostics
    "-SA4010", # Disable append check - tests use append patterns for demonstration
    "-SA4031", # Disable nil check - some nil checks are defensive
    "-SA6002", # Disable sync.Pool argument check - performance optimization not critical
    "-S1009",  # Disable nil check suggestion - explicit nil checks improve readability
    "-S1031",  # Disable unnecessary nil check - defensive coding style
    "-S1024",  # Disable time.Until suggestion - Sub is clearer in some contexts
]

# Per-package overrides if needed
# [[analyzers]]
# name = "SA1019"
# severity = "warning"
